repos:
  - repo: local
    hooks:
      - id: black
        name: black (formatting)
        entry: black --check
        language: system
        types: [python]
      - id: ruff
        name: ruff (linting)
        entry: ruff check
        language: system
        types: [python]
      - id: mypy
        name: mypy (type checking)
        entry: mypy app.py
        language: system
        pass_filenames: false
      - id: vulture
        name: vulture (dead code checking)
        entry: vulture app.py
        language: system
        pass_filenames: false
      - id: bandit
        name: bandit (security checks)
        entry: bandit -r app.py
        language: system
        pass_filenames: false
      - id: uv-audit
        name: uv-audit (package audit)
        entry: python run_audit.py
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest (unit tests)
        entry: python -m pytest
        language: system
        pass_filenames: false
      - id: compliance
        name: compliance (compliance checks)
        entry: python check_compliance.py
        language: system
        pass_filenames: false
